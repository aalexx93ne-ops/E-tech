{% load static %}
<div class="product-card" role="article">
  <!-- Вся обёртка кликабельна, кроме кнопок -->
  <a href="{% url 'index:product_detail' product.slug %}" class="product-link" aria-label="Подробнее о товаре">
    <div class="product-image">
      {% if product.main_image %}
        <img src="{{ product.main_image.url }}" alt="{{ product.name }}">
      {% else %}
        <img src="{% static 'img/placeholder.png' %}" alt="Нет изображения">
      {% endif %}
    </div>
    <div class="product-info">
      <h3 class="product-name">{{ product.name }}</h3>
      <p class="product-details">
        {{ product.description }}
      </p>
      <div class="product-price">
        {% if product.has_discount %}
          <del class="old-price">{{ product.price }} ₽</del>
          <strong class="final-price">{{ product.get_final_price }} ₽</strong>
        {% else %}
          <span class="final-price">{{ product.price }} ₽</span>
        {% endif %}
      </div>
    </div>
  </a>

  <!-- Кнопки действия вне ссылки -->
  <div class="product-actions">
    <form hx-post="{% url 'cart:cart_add' product.id %}"
          hx-target="#cart-counter"
          hx-swap="outerHTML">
        {% csrf_token %}
        <input type="hidden" name="quantity" value="1">
        <button type="submit" class="action-btn primary" title="Купить">Купить</button>
    </form>
    <button type="button" class="action-btn compare-btn" data-product-id="{{ product.id }}" title="Сравнить">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 12v6a2 2 0 002 2h12a2 2 0 002-2v-6M4 12a2 2 0 012-2h12a2 2 0 012 2M4 12V8a2 2 0 012-2h12a2 2 0 012 2v4m-8-4v8m-4-4l4-4m4 4l-4-4"/>
      </svg>
      <span class="compare-btn__text">Сравнить</span>
    </button>
  </div>
</div>
